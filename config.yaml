output:
  title: "AWS Update RSS for SA"
  link: "https://aws.amazon.com/new/"
  description: "Filtered and Korean-friendly AWS updates for SA, FSI, networking, security, and operations."
  language: "ko-KR"
  max_items: 100
  max_age_days: 30

fetch:
  timeout_seconds: 20
  user_agent: "aws-update-rss/1.0 (+https://github.com/emelvmdk/aws-update-rss)"

localization:
  enabled: true
  preferred_docs_locale: "ko_kr"
  preferred_aws_site_locale: "ko"
  fallback_to_original: true

summary:
  max_summary_chars: 700
  max_detail_chars: 900
  include_matched_keywords: true
  include_language_status: true
  include_severity: true
  include_severity_reasons: true

