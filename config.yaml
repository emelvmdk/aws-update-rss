output:
  title: "AWS Update Notifications"
  link: "https://aws.amazon.com/new/"
  description: "Filtered and Korean-friendly AWS updates for SA, FSI, networking, security, and operations."
  language: "ko-KR"
  max_items: 100
  max_age_days: 30

fetch:
  timeout_seconds: 20
  user_agent: "aws-update-rss/1.0 (+https://github.com/emelvmdk/aws-update-rss)"

localization:
  enabled: true
  preferred_docs_locale: "ko_kr"
  preferred_aws_site_locale: "ko"
  fallback_to_original: true

summary:
  max_summary_chars: 700
  max_detail_chars: 900
  include_matched_keywords: true
  include_language_status: true
  include_severity: true
  include_severity_reasons: true

what_new_filter:
  # Precise service names. These are narrow enough to include by themselves.
  always_include_keywords:
    - CloudWatch Logs
    - Log Analytics
    - Application Signals
    - Internet Monitor
    - Network Flow Monitor
    - Transit Gateway
    - Cloud WAN
    - Direct Connect
    - Site-to-Site VPN
    - PrivateLink
    - VPC Endpoint
    - Interface Endpoint
    - Gateway Endpoint
    - Endpoint Service
    - Gateway Load Balancer
    - GWLB
    - Gateway Load Balancer Endpoint
    - GWLBe
    - Network Firewall
    - Route 53
    - Resolver
    - VPC IPAM
    - AWS Network Manager
    - Network Manager
    - Reachability Analyzer
    - Network Access Analyzer
    - Traffic Mirroring
    - VPC Flow Logs
    - NAT Gateway
    - Internet Gateway
    - Egress-only Internet Gateway
    - Managed Prefix List
    - Security Hub
    - GuardDuty
    - Inspector
    - IAM Access Analyzer
    - AWS Secrets Manager
    - Secrets Manager
    - AWS Certificate Manager
    - AWS Audit Manager
    - Audit Manager
    - Amazon Macie
    - Macie
    - AWS Config
    - AWS Control Tower
    - Control Tower
    - Landing Zone
    - Account Factory
    - IAM Identity Center
    - Service Control Policy
    - CloudTrail
    - AWS WAF
    - WAF
    - AWS Shield
    - Firewall Manager
    - AWS Firewall Manager
    - AWS RAM
    - Resource Access Manager
    - AWS Health
    - AWS Personal Health Dashboard
    - Service Quotas

  # Broad service or acronym keywords. These need a relevance keyword below.
  contextual_keywords:
    - CloudWatch
    - Observability
    - VPC
    - TGW
    - VPN
    - CloudFront
    - Load Balancer
    - Elastic Load Balancing
    - ALB
    - NLB
    - Network Load Balancer
    - Application Load Balancer
    - IAM
    - AWS Organizations
    - Organizations
    - SCP
    - KMS
    - AWS Backup
    - Backup
    - Resilience Hub
    - Artifact
    - Shield
    - Verified Access
    - CloudFront Functions
    - Lambda@Edge
    - EventBridge
    - Systems Manager
    - SSM
    - Incident Manager
    - Change Manager

  # Context words that make broad keywords relevant enough for What’s New.
  relevance_keywords:
    - console
    - dashboard
    - console experience
    - dashboard experience
    - new console
    - console navigation
    - security
    - vulnerability
    - CVE
    - encryption
    - deprecated
    - deprecate
    - end of support
    - mandatory
    - permission
    - permissions
    - policy
    - authorization
    - authentication
    - behavior change
    - breaking change
    - data exposure
    - sensitive data
    - prompt injection
    - guardrail
    - guardrails
    - appliance mode
    - route propagation
    - route table
    - routing
    - endpoint
    - health check
    - failover
    - tunnel
    - BGP
    - landing zone
    - account factory
    - organizational unit
    - log analytics
    - logs
    - alarm
    - alarms
    - metric
    - metrics
    - monitoring

  exclude_keywords:
    - HealthOmics
    - GameLift
    - IoT Core
    - SageMaker
    - Nova
    - Q Business
    - Bedrock
    - Amazon Bedrock
    - Bedrock Guardrails
    - Bedrock Agents
    - Bedrock Knowledge Bases

