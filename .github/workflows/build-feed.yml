name: Build filtered AWS update RSS

on:
  push:
    branches:
      - main
  schedule:
    # Wakes up frequently and lets scripts/schedule_gate.py catch up
    # missed KST target slots: 08:13, 12:13, and 16:13.
    - cron: "* * * * *"
  workflow_dispatch:
    inputs:
      include_test_item:
        description: "Add one temporary RSS test item to verify Slack delivery"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      replay_recent_items:
        description: "Replay the newest N RSS items with fresh GUIDs/links for Slack RSS recovery"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
          - "3"
          - "5"
          - "10"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.schedule_gate.outputs.should_run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide whether this tick should build
        id: schedule_gate
        run: |
          python scripts/schedule_gate.py decide

      - name: Set up Python
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        run: |
          pytest -q

      - name: Generate RSS feed
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        run: |
          python generate_feed.py

      - name: Add Slack RSS replay items
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && inputs.replay_recent_items != '0' }}
        env:
          SLACK_REPLAY_RECENT_ITEMS: ${{ inputs.replay_recent_items }}
        run: |
          python scripts/add_slack_replay_items.py

      - name: Add manual Slack RSS test item
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && inputs.include_test_item == 'true' }}
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          from email.utils import format_datetime
          from pathlib import Path
          from xml.etree import ElementTree as ET

          feed_path = Path("public/feed.xml")
          tree = ET.parse(feed_path)
          root = tree.getroot()
          channel = root.find("channel")
          if channel is None:
              raise RuntimeError("RSS channel element was not found")

          now = datetime.now(timezone.utc)
          timestamp = now.strftime("%Y%m%d%H%M%S")

          item = ET.Element("item")
          ET.SubElement(item, "title").text = f"[Manual Slack RSS Test] Slack RSS delivery test {timestamp}"
          ET.SubElement(item, "link").text = f"https://github.com/emelvmdk/aws-update-rss/actions#manual-slack-rss-test-{timestamp}"
          ET.SubElement(item, "guid", isPermaLink="false").text = f"manual-slack-rss-test-{timestamp}"
          ET.SubElement(item, "pubDate").text = format_datetime(now)
          ET.SubElement(item, "description").text = (
              "<p><strong>중요도</strong>: Low</p>"
              "<p><strong>요약</strong>: Slack RSS 앱이 새 item을 감지하는지 확인하기 위한 수동 테스트 항목입니다. "
              "다음 정기 실행 때 feed에서 사라집니다.</p>"
              "<p><strong>링크</strong>: <a href=\"https://github.com/emelvmdk/aws-update-rss/actions\">https://github.com/emelvmdk/aws-update-rss/actions</a></p>"
          )
          ET.SubElement(item, "category").text = "test"

          first_item = channel.find("item")
          if first_item is None:
              channel.append(item)
          else:
              insert_index = list(channel).index(first_item)
              channel.insert(insert_index, item)

          feed_path.write_text(
              ET.tostring(root, encoding="utf-8", xml_declaration=True).decode("utf-8"),
              encoding="utf-8",
          )
          print(f"Added manual Slack RSS test item manual-slack-rss-test-{timestamp}")
          PY

      - name: Format RSS for Slack readability
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        run: |
          python scripts/format_slack_rss.py

      - name: Record run metadata
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        env:
          TARGET_TYPE: ${{ steps.schedule_gate.outputs.target_type }}
          TARGET_SLOT_KST: ${{ steps.schedule_gate.outputs.target_slot_kst }}
          DECISION_REASON: ${{ steps.schedule_gate.outputs.reason }}
          EVENT_SCHEDULE: ${{ steps.schedule_gate.outputs.event_schedule }}
        run: |
          python scripts/schedule_gate.py record

      - name: Configure GitHub Pages
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    if: ${{ needs.build.outputs.should_run == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
