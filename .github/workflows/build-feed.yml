name: Build filtered AWS update RSS

on:
  push:
    branches:
      - main
  schedule:
    # Wakes up every 5 minutes and lets scripts/schedule_gate.py catch up
    # missed KST target slots: 08:13, 12:13, and 16:13.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      include_test_item:
        description: "Add one temporary RSS test item to verify Slack delivery"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.schedule_gate.outputs.should_run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide whether this tick should build
        id: schedule_gate
        run: |
          python scripts/schedule_gate.py decide

      - name: Set up Python
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        run: |
          pytest -q

      - name: Generate RSS feed
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        run: |
          python generate_feed.py

      - name: Format RSS for Slack readability
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        run: |
          python scripts/format_slack_rss.py

      - name: Add source name to RSS item titles
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        run: |
          python - <<'PY'
          import html
          import re
          from pathlib import Path
          from xml.etree import ElementTree as ET

          feed_path = Path("public/feed.xml")
          tree = ET.parse(feed_path)
          root = tree.getroot()
          channel = root.find("channel")
          if channel is None:
              raise RuntimeError("RSS channel element was not found")

          source_pattern = re.compile(r"<strong>출처</strong>:\s*([^<]+)")

          for item in channel.findall("item"):
              title_node = item.find("title")
              description_node = item.find("description")
              if title_node is None or not title_node.text:
                  continue

              description = description_node.text if description_node is not None and description_node.text else ""
              match = source_pattern.search(description)
              source_name = html.unescape(match.group(1)).strip() if match else ""

              if not source_name:
                  continue
              if title_node.text.startswith(f"[{source_name}]"):
                  continue

              current_title = title_node.text
              current_title = re.sub(r"^\[[^\]]+\]", "", current_title).strip()

              title_node.text = f"[{source_name}] {current_title}"

          feed_path.write_text(
              ET.tostring(root, encoding="utf-8", xml_declaration=True).decode("utf-8"),
              encoding="utf-8",
          )
          print("Added source names to RSS item titles.")
          PY

      - name: Add manual Slack RSS test item
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && inputs.include_test_item == 'true' }}
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          from email.utils import format_datetime
          from pathlib import Path
          from xml.etree import ElementTree as ET

          feed_path = Path("public/feed.xml")
          tree = ET.parse(feed_path)
          root = tree.getroot()
          channel = root.find("channel")
          if channel is None:
              raise RuntimeError("RSS channel element was not found")

          now = datetime.now(timezone.utc)
          timestamp = now.strftime("%Y%m%d%H%M%S")

          item = ET.Element("item")
          ET.SubElement(item, "title").text = f"[Manual Slack RSS Test] Slack RSS delivery test {timestamp}"
          ET.SubElement(item, "link").text = "https://github.com/emelvmdk/aws-update-rss/actions"
          ET.SubElement(item, "guid", isPermaLink="false").text = f"manual-slack-rss-test-{timestamp}"
          ET.SubElement(item, "pubDate").text = format_datetime(now)
          ET.SubElement(item, "description").text = (
              "<p><strong>테스트</strong>: Slack RSS 앱이 새 item을 감지하는지 확인하기 위한 "
              "수동 테스트 항목입니다. 다음 정기 실행 때 feed에서 사라집니다.</p>"
              "<p><strong>출처</strong>: Manual Slack RSS Test</p>"
              "<p><strong>분류</strong>: test</p>"
          )
          ET.SubElement(item, "category").text = "test"

          first_item = channel.find("item")
          if first_item is None:
              channel.append(item)
          else:
              insert_index = list(channel).index(first_item)
              channel.insert(insert_index, item)

          feed_path.write_text(
              ET.tostring(root, encoding="utf-8", xml_declaration=True).decode("utf-8"),
              encoding="utf-8",
          )
          print(f"Added manual Slack RSS test item manual-slack-rss-test-{timestamp}")
          PY

      - name: Record run metadata
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        env:
          TARGET_TYPE: ${{ steps.schedule_gate.outputs.target_type }}
          TARGET_SLOT_KST: ${{ steps.schedule_gate.outputs.target_slot_kst }}
          DECISION_REASON: ${{ steps.schedule_gate.outputs.reason }}
          EVENT_SCHEDULE: ${{ steps.schedule_gate.outputs.event_schedule }}
        run: |
          python scripts/schedule_gate.py record

      - name: Configure GitHub Pages
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ steps.schedule_gate.outputs.should_run == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    if: ${{ needs.build.outputs.should_run == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
